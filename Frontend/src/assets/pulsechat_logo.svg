<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="bubble-clip">
      <rect x="140" y="60" width="400" height="220" rx="32"/>
    </clipPath>
  </defs>

  <!-- Main chat bubble -->
  <rect x="140" y="60" width="400" height="200" rx="32" fill="#7c6eff" style="fill:rgb(124, 110, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Inner dark panel (message area) -->
  <rect x="160" y="80" width="360" height="160" rx="20" fill="#11111a" style="fill:rgb(17, 17, 26);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Incoming message bubble -->
  <rect x="178" y="100" width="170" height="38" rx="12" fill="#1a1a28" style="fill:rgb(26, 26, 40);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="178" y="148" width="120" height="38" rx="12" fill="#1a1a28" style="fill:rgb(26, 26, 40);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Outgoing message bubble -->
  <rect x="312" y="174" width="190" height="38" rx="12" fill="#7c6eff" opacity="0.85" style="fill:rgb(124, 110, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Pulse wave lines (left side of bubble) -->
  <polyline points="148,130 155,118 162,142 169,110 176,150 183,130" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55" style="fill:none;stroke:rgb(255, 255, 255);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:round;opacity:0.55;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Bubble tail -->
  <polygon points="180,260 210,260 196,285" fill="#7c6eff" style="fill:rgb(124, 110, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Wordmark -->
  <text x="340" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" letter-spacing="1" fill="#7c6eff" style="fill:rgb(124, 110, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, sans-serif;font-size:32px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Pulse</text>
  <text x="430" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="32" font-weight="300" letter-spacing="1" fill="#c9c3ff" style="fill:rgb(201, 195, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, sans-serif;font-size:32px;font-weight:300;text-anchor:start;dominant-baseline:auto">Chat</text>

  <!-- Tagline -->
  <text x="340" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7c6eff" opacity="0.6" letter-spacing="3" style="fill:rgb(124, 110, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:Arial, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">REAL-TIME MESSAGING</text>
</svg>